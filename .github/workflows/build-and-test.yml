name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release
  POSTGRES_VERSION: '16'

jobs:
  build-and-test:
    name: Build and Test (.NET 10)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Display .NET info
      run: dotnet --info

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore --configuration ${{ env.CONFIGURATION }}

    - name: Run tests with code coverage
      id: test-step
      continue-on-error: true # Allow artifacts to be uploaded even if tests fail
      run: |
        dotnet test --no-build --configuration ${{ env.CONFIGURATION }} \
          --verbosity normal \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage \
          --logger "trx;LogFileName=test-results.trx" \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover \
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*]PgQuery.*"
      env:
        ConnectionStrings__TestDatabase: "Host=localhost;Port=5432;Database=testdb;Username=postgres;Password=testpassword"

    - name: Generate coverage report
      uses: danielpalme/ReportGenerator-GitHub-Action@5.2.0
      with:
        reports: 'coverage/**/coverage.opencover.xml'
        targetdir: 'coveragereport'
        reporttypes: 'Html;MarkdownSummaryGithub;Badges'
        title: 'pgPacTool Code Coverage'

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coveragereport/
        retention-days: 30

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/*.trx'
        retention-days: 30

    - name: Add coverage to PR comment
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');

          // Read the markdown summary if it exists
          let coverageSummary = '';
          try {
            coverageSummary = fs.readFileSync('coveragereport/SummaryGithub.md', 'utf8');
          } catch (err) {
            coverageSummary = 'Code coverage report not available.';
          }

          const output = `
          ## 🧪 Build and Test Results

          ✅ Build successful
          ✅ Tests completed

          ### 📊 Code Coverage

          ${coverageSummary}

          [View detailed coverage report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          `;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          });

    - name: Check coverage threshold
      run: |
        # Extract line coverage percentage from the summary
        if [ -f "coveragereport/SummaryGithub.md" ]; then
          coverage=$(grep -oP 'Line coverage.*?(\d+\.\d+)%' coveragereport/SummaryGithub.md | grep -oP '\d+\.\d+' || echo "0")
          echo "Current coverage: ${coverage}%"

          threshold=70.0
          if (( $(echo "$coverage < $threshold" | bc -l) )); then
            echo "❌ Coverage ${coverage}% is below threshold ${threshold}%"
          else
            echo "✅ Coverage ${coverage}% meets threshold ${threshold}%"
          fi
        else
          echo "⚠️ Coverage report not found, skipping threshold check"
        fi

    - name: Fail if tests failed
      if: steps.test-step.outcome == 'failure'
      run: |
        echo "❌ Tests failed! Check the test results artifact for details."
        exit 1

