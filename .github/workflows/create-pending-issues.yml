name: Create Pending GitHub Issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list issues that would be created without creating them)'
        required: false
        default: 'false'
        type: boolean

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    name: Create Pending Issues
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create Labels
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        create_label() {
          local name="$1"
          local color="$2"
          local description="$3"
          gh label create "$name" --color "$color" --description "$description" --force 2>/dev/null || true
        }

        create_label "enhancement"       "a2eeef" "New feature or request"
        create_label "comparison"        "0075ca" "Schema comparison functionality"
        create_label "deployment"        "e4e669" "Deployment and publishing functionality"
        create_label "packaging"         "d93f0b" "DacPackage and NuGet packaging"
        create_label "compilation"       "7057ff" "Compilation and validation"
        create_label "extraction"        "008672" "Database extraction functionality"
        create_label "sdk"               "e99695" "MSBuild SDK and tooling"
        create_label "templates"         "f9d0c4" "Project and item templates"
        create_label "cli"               "fef2c0" "CLI commands and tooling"
        create_label "container"         "bfd4f2" "Container image support"
        create_label "documentation"     "0075ca" "Documentation improvements"
        create_label "high-priority"     "b60205" "High priority item"
        create_label "medium-priority"   "e4e669" "Medium priority item"
        create_label "low-priority"      "cfd3d7" "Low priority item"
        create_label "milestone-3"       "0e8a16" "Milestone 3: Schema Comparison"
        create_label "milestone-4"       "0e8a16" "Milestone 4: Deployment & Publishing"
        create_label "milestone-5"       "0e8a16" "Milestone 5: Packaging & References"
        create_label "milestone-6"       "0e8a16" "Milestone 6: MSBuild SDK (v1.0.0)"
        create_label "milestone-7"       "0e8a16" "Milestone 7: Production Ready (v1.0.0)"
        create_label "milestone-2"       "0e8a16" "Milestone 2: Compilation & Validation"
        create_label "good-first-issue"  "7057ff" "Good for newcomers"

    - name: Create Pending Issues
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DRY_RUN: ${{ inputs.dry_run }}
        REPO: ${{ github.repository }}
      run: |
        create_issue() {
          local title="$1"
          local body="$2"
          local labels="$3"

          # Check if issue already exists
          existing=$(gh issue list --repo "$REPO" --search "\"$title\" in:title" --json number,title --jq ".[] | select(.title == \"$title\") | .number" 2>/dev/null | head -1)

          if [ -n "$existing" ]; then
            echo "  ⏭  Issue already exists: #$existing - $title"
            return
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "  [DRY RUN] Would create: $title (labels: $labels)"
            return
          fi

          number=$(gh issue create \
            --repo "$REPO" \
            --title "$title" \
            --body "$body" \
            --label "$labels" \
            2>/dev/null | grep -oP '(?<=issues/)\d+' || echo "unknown")

          echo "  ✅ Created issue #$number - $title"
        }

        echo "=== Creating Milestone 3: Schema Comparison Issues ==="

        create_issue \
          "Complete PgSchemaComparer Implementation" \
          "## Description

Complete the implementation of \`PgSchemaComparer\` to detect all differences between source and target schemas across all object types.

## Acceptance Criteria

- [ ] Complete table comparison implementation (currently incomplete)
- [ ] Implement view comparison
- [ ] Implement function/procedure comparison
- [ ] Implement trigger comparison
- [ ] Implement index comparison
- [ ] Implement constraint comparison
- [ ] Implement role comparison
- [ ] Complete sequence comparison with all options
- [ ] Generate detailed diff objects for each change type
- [ ] Include before/after states in diffs
- [ ] Handle renames vs drop+create scenarios
- [ ] Support comparison options (ignore case, ignore comments, etc.)
- [ ] Add unit tests for each comparison type
- [ ] Add integration tests with real databases

## Milestone

v0.3.0 - Schema Comparison

## Story Points

13" \
          "enhancement,comparison,medium-priority,milestone-3"

        create_issue \
          "Implement PublishScriptGenerator" \
          "## Description

Implement script generation that converts schema differences into executable SQL deployment scripts with proper dependency ordering and safety features.

## Acceptance Criteria

### Script Generation
- [ ] Generate CREATE scripts for new objects
- [ ] Generate DROP scripts for removed objects
- [ ] Generate ALTER scripts for modified objects
- [ ] Implement topological sort for dependency ordering

### Object-Specific Scripts
- [ ] Handle schema changes (CREATE/ALTER SCHEMA)
- [ ] Handle table alterations (add/drop/modify columns, rename)
- [ ] Handle index changes (DROP/CREATE indexes)
- [ ] Handle constraint changes
- [ ] Handle function/procedure changes (CREATE OR REPLACE)
- [ ] Handle view changes (CREATE OR REPLACE)
- [ ] Handle trigger changes (DROP/CREATE)

### Safety Features
- [ ] Wrap in transaction where appropriate (BEGIN/COMMIT/ROLLBACK)
- [ ] Generate rollback scripts
- [ ] Detect data-lossy changes and add warnings
- [ ] Support IF EXISTS / IF NOT EXISTS clauses
- [ ] Add script header with metadata (source, target, date)

## Example Output

\`\`\`sql
-- Deployment script generated by pgPacTool
-- Source: MyDatabase v1.0.0
-- Target: production_server
-- Date: 2026-01-31 10:00:00

BEGIN;
ALTER TABLE customers ADD COLUMN email VARCHAR(255);
CREATE INDEX idx_customers_email ON customers(email);
COMMIT;
\`\`\`

## Dependencies

- Depends on: Complete PgSchemaComparer Implementation
- Blocks: Implement CLI Commands (publish command)

## Milestone

v0.4.0 - Deployment & Publishing

## Story Points

