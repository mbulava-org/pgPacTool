name: Build Native libpg_query Libraries

on:
  # Manual trigger with version selection
  workflow_dispatch:
    inputs:
      pg_versions:
        description: 'PostgreSQL versions to build (comma-separated, e.g., "15,16,17,18")'
        required: true
        default: '15,16,17,18'
      force_rebuild:
        description: 'Force rebuild even if files exist'
        type: boolean
        default: false

  # Automatic trigger when this workflow file changes - but DON'T build, just validate
  # push:
  #   paths:
  #     - '.github/workflows/build-native-libraries.yml'

env:
  NPGQUERY_PROJECT_PATH: src/libs/Npgquery/Npgquery
  # Default versions for non-workflow_dispatch triggers
  # Supported versions: PostgreSQL 15, 16, 17, 18
  DEFAULT_PG_VERSIONS: '15,16,17,18'

jobs:
  build-matrix:
    name: Build libpg_query
    # Supported PostgreSQL versions:
    # - PG15: Supported for legacy compatibility
    # - PG16: Supported, default version
    # - PG17: Supported with JSON_TABLE and newer parser features
    # - PG18: Supported, but integration/container coverage may require version-specific setup
    strategy:
      fail-fast: false
      matrix:
        os: 
          - windows-latest
          - ubuntu-latest
          - macos-latest  # Changed from macos-13 - uses latest stable
        pg_version: ${{ fromJson(format('[{0}]', github.event.inputs.pg_versions || '15,16,17,18')) }}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Npgquery repository
        uses: actions/checkout@v4
        with:
          path: npgquery

      - name: Checkout libpg_query
        uses: actions/checkout@v4
        with:
          repository: pganalyze/libpg_query
          ref: ${{ matrix.pg_version == 18 && '18-latest-dev' || format('{0}-latest', matrix.pg_version) }}
          path: libpg_query

      - name: Set up build environment (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Set up Visual Studio Developer Command Prompt (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: |
          # Xcode command line tools should be pre-installed, but ensure make is available
          which make || xcode-select --install

      - name: Build libpg_query and create DLL (Windows)
        if: runner.os == 'Windows'
        working-directory: libpg_query
        shell: pwsh
        run: |
          # Build static library first (this also compiles examples)
          nmake /F Makefile.msvc

          Write-Host "Listing all .obj files after nmake:"
          Get-ChildItem -Recurse -Filter *.obj | Select-Object FullName, Length | Format-Table

          $pgQueryLibPath = (Resolve-Path .\pg_query.lib).Path

          Write-Host "`nChecking pg_query.lib contents: $pgQueryLibPath"
          lib /LIST "$pgQueryLibPath"

          Write-Host "`nCreating DLL from static library..."

          # Create version-specific DEF file from the symbols that actually exist in pg_query.lib
          # This avoids linker failures when a branch lacks one of the hard-coded exports.
          $pgVersion = "${{ matrix.pg_version }}"
          Write-Host "Creating DEF file for PostgreSQL $pgVersion..."
          $headerPublicApis = [regex]::Matches((Get-Content pg_query.h -Raw), '\b(pg_query_[A-Za-z0-9_]+)\s*\(') |
            ForEach-Object { $_.Groups[1].Value } |
            Sort-Object -Unique

          Write-Host "Detected public pg_query APIs in pg_query.h:"
          $headerPublicApis | ForEach-Object { Write-Host "  $_" }

          $selectedExports = $headerPublicApis

          if ($selectedExports.Count -eq 0) {
            Write-Host "❌ No pg_query exports were detected for DEF generation."
            exit 1
          }

          Write-Host "Selected exports for pg_query.def:"
          $selectedExports | ForEach-Object { Write-Host "  $_" }

          $defContent = "LIBRARY pg_query`nEXPORTS`n"
          foreach ($exportName in $selectedExports) {
            $defContent += "    $exportName`n"
          }
          $defContent | Out-File -FilePath pg_query.def -Encoding ASCII

          Write-Host "Generated pg_query.def:"
          Get-Content pg_query.def

          # Link the static library directly with the generated DEF file.
          # This is more robust than extracting every object file first.
          Write-Host "Linking DLL directly from: $pgQueryLibPath"
          & link /DLL /OUT:libpg_query.dll /IMPLIB:libpg_query_import.lib /DEF:pg_query.def "$pgQueryLibPath" MSVCRT.lib 2>&1 | Tee-Object -FilePath link-output.log

          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ Link failed with exit code $LASTEXITCODE"
            Write-Host "`nFull link output:"
            Get-Content link-output.log -ErrorAction SilentlyContinue
            exit 1
          }

          if (Test-Path libpg_query.dll) {
            Write-Host "✓ Built libpg_query.dll"
            Get-Item libpg_query.dll | Format-Table Name, Length
          } else {
            Write-Host "❌ Failed to build libpg_query.dll"
            Get-Content *.log -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Build libpg_query and create shared library (Linux)
        if: runner.os == 'Linux'
        working-directory: libpg_query
        run: |
          # Build static library first
          make

          # Create shared library from object files
          # Extract all .o files from the static library
          ar -x libpg_query.a

          # Link into shared library
          gcc -shared -fPIC -o libpg_query.so *.o -pthread

          echo "✓ Built libpg_query.so"
          ls -lh libpg_query.so

      - name: Build libpg_query and create shared library (macOS)
        if: runner.os == 'macOS'
        working-directory: libpg_query
        run: |
          # Build static library first
          # On macOS 15+, strchrnul is already defined in the system
          # Add HAVE_STRCHRNUL to prevent redefinition in PostgreSQL code
          make CFLAGS="-DHAVE_STRCHRNUL" || make

          # Create shared library from object files
          # Extract all .o files from the static library
          ar -x libpg_query.a

          # Link into dynamic library
          gcc -dynamiclib -o libpg_query.dylib *.o -pthread

          echo "✓ Built libpg_query.dylib"
          ls -lh libpg_query.dylib

      - name: Debug - List built files (Unix)
        if: runner.os != 'Windows'
        working-directory: libpg_query
        run: |
          echo "Files in libpg_query directory after build:"
          ls -lah | grep -E '\.(so|dylib|a)$' || echo "No shared libraries found"
          echo ""
          echo "Searching for all library files:"
          find . -type f \( -name "*.so" -o -name "*.dylib" -o -name "*.a" \) -ls
      
      - name: Determine output filename and runtime identifier
        id: get-info
        shell: bash
        run: |
          # Determine platform and architecture
          if [ "${{ runner.os }}" == "Windows" ]; then
            RID="win-x64"
            SRC_FILE="libpg_query/libpg_query.dll"
            DEST_FILE="libpg_query_${{ matrix.pg_version }}.dll"
          elif [ "${{ runner.os }}" == "Linux" ]; then
            RID="linux-x64"
            # libpg_query build outputs to root directory
            SRC_FILE="libpg_query/libpg_query.so"
            DEST_FILE="libpg_query_${{ matrix.pg_version }}.so"
          elif [ "${{ runner.os }}" == "macOS" ]; then
            # Detect ARM vs Intel Mac
            if [ "$(uname -m)" == "arm64" ]; then
              RID="osx-arm64"
            else
              RID="osx-x64"
            fi
            # libpg_query build outputs to root directory
            SRC_FILE="libpg_query/libpg_query.dylib"
            DEST_FILE="libpg_query_${{ matrix.pg_version }}.dylib"
          fi

          echo "rid=$RID" >> $GITHUB_OUTPUT
          echo "src_file=$SRC_FILE" >> $GITHUB_OUTPUT
          echo "dest_file=$DEST_FILE" >> $GITHUB_OUTPUT

          # Create target directory
          TARGET_DIR="npgquery/${{ env.NPGQUERY_PROJECT_PATH }}/runtimes/$RID/native"
          mkdir -p "$TARGET_DIR"
          echo "target_dir=$TARGET_DIR" >> $GITHUB_OUTPUT

          echo "Will copy from: $SRC_FILE"
          echo "Will copy to: $TARGET_DIR/$DEST_FILE"
      
      - name: Copy and rename library
        shell: bash
        run: |
          echo "Attempting to copy library file..."
          echo "Source: ${{ steps.get-info.outputs.src_file }}"
          echo "Destination: ${{ steps.get-info.outputs.target_dir }}/${{ steps.get-info.outputs.dest_file }}"

          # Check if source file exists
          if [ ! -f "${{ steps.get-info.outputs.src_file }}" ]; then
            echo "❌ ERROR: Source file not found!"
            echo "Listing files in libpg_query directory:"
            ls -lah libpg_query/ | head -20
            echo ""
            echo "Searching for library files:"
            find libpg_query -type f \( -name "*.so" -o -name "*.dll" -o -name "*.dylib" -o -name "*.a" \) || true
            exit 1
          fi

          cp "${{ steps.get-info.outputs.src_file }}" \
             "${{ steps.get-info.outputs.target_dir }}/${{ steps.get-info.outputs.dest_file }}"

          echo "✓ Built ${{ steps.get-info.outputs.dest_file }} for ${{ steps.get-info.outputs.rid }}"
          ls -lh "${{ steps.get-info.outputs.target_dir }}/${{ steps.get-info.outputs.dest_file }}"
      
      - name: Verify library architecture (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          FILE_PATH="${{ steps.get-info.outputs.target_dir }}/${{ steps.get-info.outputs.dest_file }}"
          echo "File information:"
          file "$FILE_PATH" || true
          
          if [ "${{ runner.os }}" == "macOS" ]; then
            echo "Architecture information:"
            lipo -info "$FILE_PATH" || true
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libpg_query-${{ steps.get-info.outputs.rid }}-pg${{ matrix.pg_version }}
          path: ${{ steps.get-info.outputs.target_dir }}/${{ steps.get-info.outputs.dest_file }}
          if-no-files-found: error
          retention-days: 7

  collect-and-commit:
    name: Collect libraries and create PR
    needs: build-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Organize native libraries
        shell: bash
        run: |
          # Create base directory
          BASE_DIR="${{ env.NPGQUERY_PROJECT_PATH }}/runtimes"
          mkdir -p "$BASE_DIR"
          
          # Process each artifact
          for artifact_dir in artifacts/libpg_query-*; do
            if [ -d "$artifact_dir" ]; then
              # Extract RID and version from artifact name
              artifact_name=$(basename "$artifact_dir")
              
              # Parse artifact name: libpg_query-{rid}-pg{version}
              rid=$(echo "$artifact_name" | sed -E 's/libpg_query-([^-]+(-[^-]+)?)-pg[0-9]+/\1/')
              
              # Create target directory
              target_dir="$BASE_DIR/$rid/native"
              mkdir -p "$target_dir"
              
              # Copy files
              cp "$artifact_dir"/* "$target_dir/" || true
              
              echo "✓ Copied libraries to $target_dir"
              ls -lh "$target_dir"
            fi
          done
          
          echo ""
          echo "=== Final directory structure ==="
          tree "$BASE_DIR" || find "$BASE_DIR" -type f
      
      - name: Check for changes
        id: check-changes
        run: |
          git add ${{ env.NPGQUERY_PROJECT_PATH }}/runtimes/
          
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --staged --name-only
          fi
      
      - name: Create Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: Update native libpg_query libraries (PG ${{ github.event.inputs.pg_versions || ''15,16,17,18'' }})'
          title: 'Update native libpg_query libraries'
          body: |
            ## 🔄 Native Library Update
            
            This PR updates the native libpg_query libraries.
            
            **PostgreSQL Versions**: ${{ github.event.inputs.pg_versions || '15,16,17,18' }}
            
            ### Changes
            - Built libraries for Windows x64, Linux x64, macOS x64, and macOS ARM64
            - Organized in runtime-specific directories
            - Ready for multi-version PostgreSQL support
            
            ### Verification
            - [ ] Libraries exist for all platforms
            - [ ] File sizes are reasonable (typically 2-5 MB per library)
            - [ ] Build logs show no errors
            
            ### Testing
            After merge, verify with:
            ```csharp
             using var parser15 = new Parser(PostgreSqlVersion.Postgres15);
             Console.WriteLine(parser15.Parse("SELECT 1").IsSuccess);

             using var parser18 = new Parser(PostgreSqlVersion.Postgres18);
             Console.WriteLine(parser18.Parse("SELECT 1").IsSuccess);
            ```
            
            ---
            *Generated by build-native-libraries workflow*
          branch: update-native-libraries-${{ github.run_number }}
          delete-branch: true
      
      - name: Summary
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          echo "## ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Successfully built libpg_query for PostgreSQL versions: ${{ github.event.inputs.pg_versions || '16,17' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Platforms" >> $GITHUB_STEP_SUMMARY
          echo "- Windows x64" >> $GITHUB_STEP_SUMMARY
          echo "- Linux x64" >> $GITHUB_STEP_SUMMARY
          echo "- macOS x64 (Intel)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS ARM64 (Apple Silicon)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A pull request has been created with the updated libraries." >> $GITHUB_STEP_SUMMARY
      
      - name: No changes
        if: steps.check-changes.outputs.has_changes == 'false'
        run: |
          echo "## ℹ️ No Changes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Libraries are already up to date." >> $GITHUB_STEP_SUMMARY

