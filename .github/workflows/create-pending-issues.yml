          "## Description

Implement SQLCMD-style variable support for parameterizing deployment scripts and SQL files, enabling environment-specific deployments.

## Acceptance Criteria

- [ ] Support \`<SqlCmdVariable>\` items in project file with default values
- [ ] Override variables at deployment time via CLI
- [ ] Substitute variables in SQL scripts using \`\$(VariableName)\` syntax
- [ ] Validate all variable references at compile time
- [ ] Report undefined variable usage as compiler errors
- [ ] Support variables in pre/post deployment scripts
